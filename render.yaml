# Render blueprint: ONE Docker web service (FastAPI serving the React build)
# plus a managed Postgres. Deploy with "New > Blueprint" against this repo, then
# set the two sync:false secrets in the dashboard.
services:
  - type: web
    name: news-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: news-ai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: GNEWS_API_KEY
        sync: false
      # --- Auth (WorkOS AuthKit) ---
      # Set all of these to enable real login/signup. Leave them unset to run in
      # dev-mode (no login, single shared user).
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      # Encrypts the session cookie; needs any >=32-char secret — Render generates one.
      - key: WORKOS_COOKIE_PASSWORD
        generateValue: true
      # APP_BASE_URL and WORKOS_REDIRECT_URI must equal the live service URL, which
      # you only know after the first deploy — set them in the dashboard then, and
      # register the same callback in the WorkOS dashboard's redirect URIs.
      #   APP_BASE_URL         = https://<your-url>.onrender.com
      #   WORKOS_REDIRECT_URI  = https://<your-url>.onrender.com/api/auth/callback
      - key: APP_BASE_URL
        sync: false
      - key: WORKOS_REDIRECT_URI
        sync: false
      # Required on HTTPS so the session cookie is actually sent to the browser.
      - key: SESSION_COOKIE_SECURE
        value: "true"

databases:
  - name: news-ai-db
    plan: free
