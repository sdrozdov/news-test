# Render blueprint: ONE Docker web service (FastAPI serving the React build)
# plus a managed Postgres. Deploy with "New > Blueprint" against this repo, then
# set the two sync:false secrets in the dashboard.
services:
  - type: web
    name: news-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: news-ai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: GNEWS_API_KEY
        sync: false
      - key: AUTO_CREATE_TABLES
        value: "true"

databases:
  - name: news-ai-db
    plan: free
